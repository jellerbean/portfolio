<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jelly Folio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: url('background/asadal_stock_111.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            font-family: 'MS Sans Serif', 'Courier Prime', monospace;
            padding: 10px;
            overflow: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background-image: 
                radial-gradient(ellipse 400px 100px at 20% 25%, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(ellipse 350px 80px at 60% 20%, rgba(255, 255, 255, 0.25), transparent),
                radial-gradient(ellipse 420px 90px at 90% 35%, rgba(255, 255, 255, 0.28), transparent);
            background-size: 100% 100%;
            background-repeat: no-repeat;
            animation: cloudDrift 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 50%;
            left: 0;
            width: 200%;
            height: 50%;
            background-image: 
                radial-gradient(ellipse 380px 85px at 15% 40%, rgba(255, 255, 255, 0.2), transparent),
                radial-gradient(ellipse 360px 75px at 70% 45%, rgba(255, 255, 255, 0.22), transparent),
                radial-gradient(ellipse 400px 95px at 85% 55%, rgba(255, 255, 255, 0.2), transparent);
            background-size: 100% 100%;
            background-repeat: no-repeat;
            animation: cloudDrift 25s linear infinite reverse;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes cloudDrift {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
        
        .desktop {
            position: relative;
            width: 100%;
            height: 100vh;
            z-index: 10;
        }
        
        .window {
            background: linear-gradient(135deg, #c0c0c0 0%, #dfdfdf 50%, #b0b0b0 100%);
            border: 2px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            box-shadow: 1px 1px 0 #dfdfdf, 2px 2px 0 #808080;
            display: flex;
            flex-direction: column;
            position: absolute;
            width: 400px;
            height: 350px;
            resize: both;
            overflow: hidden;
            touch-action: none;
        }
        
        .window:nth-child(1) {
            left: 50px;
            top: 50px;
        }
        
        .window:nth-child(2) {
            left: 520px;
            top: 100px;
        }
        
        .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #c0c0c0 0%, #808080 100%);
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            cursor: nwse-resize;
            user-select: none;
        }
        
        .title-bar {
            background: linear-gradient(90deg, #000080 0%, #1084d7 100%);
            color: #ffffff;
            padding: 2px 2px;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            border-bottom: 1px solid #000080;
        }
        
        .title-bar-buttons {
            display: flex;
            gap: 2px;
        }
        
        .window-button {
            width: 16px;
            height: 14px;
            background: linear-gradient(135deg, #c0c0c0 0%, #808080 100%);
            border: 1px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            font-size: 10px;
            font-weight: bold;
            color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }
        
        .window-button:active {
            border-top-color: #808080;
            border-left-color: #808080;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
        }
        
        .window-content {
            flex: 1;
            padding: 4px;
            background: #c0c0c0;
            overflow: auto;
            font-size: 12px;
            line-height: 1.4;
            padding-bottom: 20px;
        }
        
        .window-content h1 {
            font-size: 24px;
            margin: 10px 0;
            text-shadow: 1px 1px 0 #ffffff, 2px 2px 0 #000080;
            color: #000080;
        }
        
        .window-content h2 {
            font-size: 14px;
            margin: 10px 0 5px 0;
            color: #000080;
            text-decoration: underline;
        }
        
        .window-content p {
            margin: 5px 0;
            color: #000000;
        }
        
        .project-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        
        .gallery-year {
            width: 100%;
            margin: 10px 0 4px;
            font-size: 12px;
            font-weight: bold;
            color: #000080;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .gallery-divider {
            width: 100%;
            height: 1px;
            background: #808080;
            margin: 10px 0;
        }
        
        .project-image {
            width: calc(33.333% - 5px);
            min-width: 100px;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            border: 2px solid #808080;
            box-shadow: 1px 1px 0 #ffffff, 2px 2px 0 #808080;
            cursor: pointer;
            image-rendering: pixelated;
        }

        .project-image:hover {
            outline: 2px solid #000080;
        }
        
        .image-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }
        
        .image-overlay.active {
            display: flex;
        }
        
        .image-overlay img {
            max-width: 90%;
            max-height: 90%;
            border: 4px solid #c0c0c0;
            background: #ffffff;
            box-shadow: 4px 4px 0 #808080;
            image-rendering: pixelated;
        }
        
        .image-overlay span {
            position: absolute;
            top: 16px;
            right: 16px;
            background: #c0c0c0;
            border: 2px solid #808080;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            padding: 3px 6px;
            font-family: 'MS Sans Serif', monospace;
            font-size: 12px;
            cursor: pointer;
            color: #000000;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        
        .retro-button {
            background: linear-gradient(135deg, #dfdfdf 0%, #b0b0b0 50%, #808080 100%);
            border: 2px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 4px 12px;
            font-family: 'MS Sans Serif', monospace;
            font-size: 11px;
            font-weight: bold;
            color: #000000;
            cursor: pointer;
            user-select: none;
            text-decoration: none;
            display: inline-block;
            min-width: 80px;
            text-align: center;
        }
        
        .retro-button:hover {
            background: linear-gradient(135deg, #e8e8e8 0%, #c0c0c0 50%, #909090 100%);
        }
        
        .retro-button:active {
            border-top-color: #808080;
            border-left-color: #808080;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
            background: linear-gradient(135deg, #b0b0b0 0%, #808080 50%, #dfdfdf 100%);
        }
        
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            background: linear-gradient(90deg, #c0c0c0 0%, #dfdfdf 100%);
            border-top: 2px solid #ffffff;
            border-bottom: 2px solid #808080;
            display: flex;
            align-items: center;
            padding: 2px;
            gap: 2px;
            z-index: 1000;
        }
        
        .start-button {
            background: linear-gradient(135deg, #dfdfdf 0%, #b0b0b0 100%);
            border: 2px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 3px 6px;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            color: #000000;
        }
        
        .start-button:hover {
            background: linear-gradient(135deg, #e8e8e8 0%, #c0c0c0 100%);
        }
        
        .spacer {
            flex: 1;
        }
        
        .start-menu {
            position: fixed;
            bottom: 28px;
            left: 0;
            background: linear-gradient(135deg, #c0c0c0 0%, #dfdfdf 100%);
            border: 2px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            display: none;
            flex-direction: column;
            z-index: 999;
            min-width: 200px;
        }
        
        .start-menu.active {
            display: flex;
        }
        
        .start-menu-item {
            padding: 4px 8px;
            cursor: pointer;
            font-size: 11px;
            color: #000000;
            border: 1px solid transparent;
        }
        
        .start-menu-item:hover {
            background: #000080;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="desktop">
        <div class="window">
            <div class="title-bar">
                <span>Graphics.txt</span>
                <div class="title-bar-buttons">
                    <div class="window-button">_</div>
                    <div class="window-button">□</div>
                    <div class="window-button">✕</div>
                </div>
            </div>
            <div class="window-content">
                <div class="gallery-year">2025</div>
                <div class="project-gallery">
                    <img src="Images/ashton.png" alt="Ashton image" class="project-image" data-full="Images/ashton.png">
                    <img src="Images/BANNER.jpg" alt="Banner image" class="project-image" data-full="Images/BANNER.jpg">
                    <img src="Images/party.jpg" alt="Party image" class="project-image" data-full="Images/party.jpg">
                </div>
                <div class="gallery-divider"></div>
                <div class="gallery-year">2026</div>
                <div class="project-gallery">
                    <img src="Images/album2.jpg" alt="Album 2 image" class="project-image" data-full="Images/album2.jpg">
                </div>
            </div>
            <div class="resize-handle"></div>
        </div>
        
        <div class="window">
            <div class="title-bar">
                <span>Navigation</span>
                <div class="title-bar-buttons">
                    <div class="window-button">_</div>
                    <div class="window-button">□</div>
                    <div class="window-button">✕</div>
                </div>
            </div>
            <div class="window-content">
                <p style="font-weight: bold; margin-bottom: 10px;">Where to go next?</p>
                <div class="button-group">
                    <a href="index.html" class="retro-button">← Back Home</a>
                </div>
                <p style="margin-top: 15px; font-weight: bold;">Other Pages:</p>
                <div class="button-group">
                    <a href="skills.html" class="retro-button">Audio</a>
                    <a href="about.html" class="retro-button">Video</a>
                </div>
            </div>
            <div class="resize-handle"></div>
        </div>
    </div>
    
    <div class="image-overlay" id="imageOverlay">
        <span id="overlayClose">X</span>
        <img id="overlayImage" src="" alt="Expanded project image">
    </div>
    <div class="taskbar">
        <div class="start-button">Start</div>
        <div class="spacer"></div>
        <span style="font-size: 11px; padding: 0 5px;">Graphics | Ready</span>
    </div>
    
    <div class="start-menu" id="startMenu"></div>
    
    <script>
        document.querySelectorAll('.window').forEach(w => {
            let titleBar = w.querySelector('.title-bar');
            let resizeHandle = w.querySelector('.resize-handle');
            let offsetX = 0;
            let offsetY = 0;
            let isDragging = false;
            let isResizing = false;
            let startX = 0;
            let startY = 0;
            let startWidth = 0;
            let startHeight = 0;
            
            // Dragging functionality
            titleBar.onmousedown = (e) => {
                isDragging = true;
                offsetX = e.clientX - w.offsetLeft;
                offsetY = e.clientY - w.offsetTop;
                w.style.zIndex = 100;
            };
            
            // Resizing functionality
            resizeHandle.onmousedown = (e) => {
                isResizing = true;
                startX = e.clientX;
                startY = e.clientY;
                startWidth = w.offsetWidth;
                startHeight = w.offsetHeight;
                w.style.zIndex = 100;
                e.preventDefault();
            };
            
            document.onmousemove = (e) => {
                if (isDragging) {
                    w.style.position = 'absolute';
                    w.style.left = (e.clientX - offsetX) + 'px';
                    w.style.top = (e.clientY - offsetY) + 'px';
                }
                
                if (isResizing) {
                    let newWidth = startWidth + (e.clientX - startX);
                    let newHeight = startHeight + (e.clientY - startY);
                    
                    if (newWidth > 300) w.style.width = newWidth + 'px';
                    if (newHeight > 200) w.style.height = newHeight + 'px';
                }
            };
            
            document.onmouseup = () => {
                isDragging = false;
                isResizing = false;
            };
        });

        const overlay = document.getElementById('imageOverlay');
        const overlayImage = document.getElementById('overlayImage');
        const overlayClose = document.getElementById('overlayClose');

        document.querySelectorAll('.project-image').forEach(img => {
            img.addEventListener('click', () => {
                overlayImage.src = img.dataset.full;
                overlay.classList.add('active');
            });
        });

        overlayClose.addEventListener('click', () => overlay.classList.remove('active'));
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                overlay.classList.remove('active');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                overlay.classList.remove('active');
            }
        });
        
        // Window button functionality
        document.querySelectorAll('.window-button').forEach((btn, index) => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const windowEl = btn.closest('.window');
                if (index % 3 === 0) { // minimize
                    windowEl.style.display = 'none';
                } else if (index % 3 === 1) { // maximize
                    if (windowEl.classList.contains('maximized')) {
                        windowEl.classList.remove('maximized');
                        windowEl.style.width = '';
                        windowEl.style.height = '';
                        windowEl.style.left = '';
                        windowEl.style.top = '';
                        windowEl.style.position = '';
                        windowEl.style.zIndex = '';
                    } else {
                        windowEl.classList.add('maximized');
                        windowEl.style.position = 'fixed';
                        windowEl.style.width = '100vw';
                        windowEl.style.height = '100vh';
                        windowEl.style.left = '0';
                        windowEl.style.top = '0';
                        windowEl.style.zIndex = '1000';
                    }
                } else if (index % 3 === 2) { // close
                    windowEl.style.display = 'none';
                }
            });
        });
        
        // Start menu functionality
        const startBtn = document.querySelector('.start-button');
        const startMenu = document.getElementById('startMenu');
        
        function updateStartMenu() {
            startMenu.innerHTML = '';
            document.querySelectorAll('.window').forEach((w, idx) => {
                const titleSpan = w.querySelector('.title-bar span');
                const title = titleSpan ? titleSpan.textContent : 'Window ' + (idx + 1);
                const item = document.createElement('div');
                item.className = 'start-menu-item';
                item.textContent = title;
                item.onclick = () => {
                    w.style.display = 'block';
                    startMenu.classList.remove('active');
                    updateStartMenu();
                };
                startMenu.appendChild(item);
            });
        }
        
        startBtn.addEventListener('click', () => {
            startMenu.classList.toggle('active');
            if (startMenu.classList.contains('active')) {
                updateStartMenu();
            }
        });
        
        document.addEventListener('click', (e) => {
            if (e.target !== startBtn && !startMenu.contains(e.target)) {
                startMenu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
